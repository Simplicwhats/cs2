<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB CS 2 - ENGINE UPDATE</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- LOBBY -->
    <div id="lobby-container">
        <div class="lobby-panel">
            <div class="cs-logo">CS2 WEB<span>.js</span></div>
            <h1>GLOBAL OFFENSIVE ENGINE</h1>
            
            <div class="input-group">
                <label>NICKNAME</label>
                <input type="text" id="player-nick" class="nick-input" value="Striker" maxlength="15">
            </div>

            <div class="input-group">
                <label>MAPA TÁTICO</label>
                <select id="map-select" class="custom-select">
                    <option value="dust2">Dust II (Deserto & Caixotes)</option>
                    <option value="mirage">Mirage (Urbano & Madeira)</option>
                    <option value="inferno">Inferno (Tijolos & Alamedas)</option>
                </select>
            </div>
            
            <div class="mode-selection">
                <button class="mode-btn active" id="mode-bot" onclick="setGameMode('bot')">MODO TREINO (BOT)</button>
                <button class="mode-btn" id="mode-p2p" onclick="setGameMode('p2p')">1V1 ONLINE (P2P)</button>
            </div>

            <div class="link-section" id="net-link-section" style="display:none;">
                <input type="text" id="lobby-link" readonly onclick="this.select(); document.execCommand('copy'); alert('Link de convite copiado!');">
            </div>

            <button id="btn-start" class="start-btn">CONECTAR AO SERVIDOR</button>
        </div>
    </div>

    <!-- PAUSA -->
    <div id="pause-screen">
        <h2>PARTIDA PAUSADA</h2>
        <p>Aperte <b>ESC</b> para abrir as configurações ou clique abaixo para voltar.</p>
        <button id="btn-resume">VOLTAR AO JOGO</button>
    </div>

    <!-- MENU DE COMPRA (B) -->
    <div id="buy-menu" class="hidden">
        <div class="buy-header">
            <h2>EQUIPAMENTOS</h2>
            <div class="buy-money">SALDO: <span id="buy-money-display" class="money-text">$16000</span></div>
        </div>
        <div class="buy-grid">
            <div class="buy-column">
                <h3>PISTOLAS</h3>
                <button class="buy-item" onclick="buyWeapon('deagle')"><span>Desert Eagle</span><span class="item-price">$700</span></button>
            </div>
            <div class="buy-column">
                <h3>PESADAS/SMG</h3>
                <button class="buy-item" onclick="buyWeapon('p90')"><span>P90</span><span class="item-price">$2350</span></button>
            </div>
            <div class="buy-column">
                <h3>FUZIS</h3>
                <button class="buy-item" onclick="buyWeapon('ak47')"><span>AK-47</span><span class="item-price">$2700</span></button>
                <button class="buy-item" onclick="buyWeapon('m4a4')"><span>M4A4</span><span class="item-price">$3100</span></button>
            </div>
            <div class="buy-column">
                <h3>SNIPER</h3>
                <button class="buy-item" onclick="buyWeapon('awp')"><span>AWP</span><span class="item-price">$4750</span></button>
            </div>
        </div>
    </div>

    <!-- HUD IN-GAME -->
    <div id="scoreboard">
        <div class="team-ct"><span id="display-my-name">VOCÊ</span> <span id="score-player">0</span></div>
        <div class="vs-badge">VS</div>
        <div class="team-tr"><span id="score-enemy">0</span> <span id="display-enemy-name">INIMIGO</span></div>
    </div>

    <div id="hud-bottom-left" class="hud-panel">
        <div class="hud-icon">♥</div>
        <div class="hud-value hp-val" id="hp">100</div>
    </div>

    <div id="hud-bottom-right" class="hud-panel">
        <div class="hud-ammo-wrap">
            <span class="hud-value" id="ammo">30</span>
            <span class="hud-reserve" id="reserve-ammo">/ 90</span>
        </div>
        <div class="hud-weapon-info">
            <div id="weapon-display">AK-47</div>
            <div class="money-text" id="money-display">$800</div>
        </div>
    </div>

    <div id="buy-hint">Pressione <b>[B]</b> para Comprar Armas</div>
    <div id="crosshair"></div>
    <div id="kill-feed"></div>
    <div id="canvas-container"></div>
    
    <div id="damage-overlay"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
